<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>ISO‑Passungs‑ & Allgemeintoleranzrechner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial,system-ui;
  background:#f3f4f6;
  padding:20px;
}

.card{
  max-width:1100px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.08);
}

h1,h2{margin-top:0}
small{color:#666}

input,select,button{
  width:100%;
  padding:8px;
  margin:6px 0 14px;
}

button{
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
button:hover{background:#1d4ed8}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.result{
  background:#f9fafb;
  padding:16px;
  border-radius:12px;
  margin-top:12px;
}

.good{color:#15803d}
.mid{color:#b45309}
.bad{color:#b91c1c}

/* ================= GRAFIK ================= */

.graph-wrapper{
  margin-top:25px;
}

.graph{
  position:relative;
  height:70px;
  background:#e5e7eb;
  border-radius:35px;
  padding: 0 80px;           /* <<< WICHTIG: Label‑Zone */
  overflow:visible;
}

/* 0‑Linie */
.zero-line{
  position:absolute;
  left:50%;
  top:-10px;
  bottom:-10px;
  width:2px;
  background:#111;
}

/* Balken */
.bar{
  position:absolute;
  height:22px;
  top:50%;
  transform:translateY(-50%);
  border-radius:12px;
  transition:left .4s ease,width .4s ease;
}

.bore{ background:#2563eb; }
.shaft{ background:#dc2626; top:calc(50% + 16px); }

/* Labels */
.bar-label{
  position:absolute;
  top:-22px;
  font-size:12px;
  color:#111;
  white-space:nowrap;
  transform:translateX(-50%);
  transition:left .4s ease;
}

/* Skala */
.scale{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#444;
  padding:0 80px;
  margin-top:6px;
}

.legend{
  margin-top:8px;
  font-size:13px;
}
.legend span{margin-right:16px}
</style>
</head>

<body>

<div class="card">
<h1>ISO‑Passungsrechner (ISO 286)</h1>
<small>Tabellenbasierte Berechnung · normnah</small>

<div class="grid">
  <input id="d" type="number" value="20" placeholder="Nennmaß [mm]">
  <select id="hole">
    <option value="H">Bohrung H</option>
    <option value="G">Bohrung G</option>
    <option value="F">Bohrung F</option>
    <option value="JS">Bohrung JS</option>
    <option value="K">Bohrung K</option>
  </select>
  <select id="shaft">
    <option value="h">Welle h</option>
    <option value="g">Welle g</option>
    <option value="f">Welle f</option>
    <option value="js">Welle js</option>
    <option value="k">Welle k</option>
  </select>
  <select id="it">
    <option>6</option><option selected>7</option><option>8</option>
  </select>
</div>

<button onclick="calcISO()">Passung berechnen</button>

<div id="out" class="result"></div>

<div class="graph-wrapper">
  <div class="graph" id="graph">
    <div class="zero-line"></div>

    <div id="boreBar" class="bar bore">
      <div id="boreLabel" class="bar-label"></div>
    </div>

    <div id="shaftBar" class="bar shaft">
      <div id="shaftLabel" class="bar-label"></div>
    </div>
  </div>

  <div class="scale">
    <span>−</span><span>µm</span><span>Nennmaß</span><span>µm</span><span>+</span>
  </div>

  <div class="legend">
    <span>🔵 Bohrung</span>
    <span>🔴 Welle</span>
    <span>⚫ Linie = Nennmaß</span>
  </div>
</div>
</div>

<script>
const ranges=[3,6,10,18,30,50,80,120];
const IT={7:[10,12,15,18,21,25,30,35]};
const holeDev={
  H:[0,0,0,0,0,0,0,0],
  G:[2,3,4,6,8,10,12,15],
  F:[6,8,10,13,16,19,22,25],
  JS:[-5,-7,-9,-11,-13,-15,-18,-21],
  K:[-2,-3,-4,-5,-6,-8,-10,-12]
};
const shaftDev={
  h:[0,0,0,0,0,0,0,0],
  g:[-2,-3,-4,-5,-6,-7,-9,-10],
  f:[-6,-7,-9,-11,-13,-16,-19,-22],
  js:[-3,-4,-5,-6,-7,-8,-10,-12],
  k:[2,3,4,5,6,7,9,10]
};

function ri(d){ return ranges.findIndex(r=>d<=r); }

function calcISO(){
  const d0=Number(d.value);
  const r=ri(d0);
  const T=IT7[r]/1000;
  const EB=holeDev[hole.value][r]/1000;
  const ES=shaftDev[shaft.value][r]/1000;

  const boreMin=d0+EB, boreMax=boreMin+T;
  const shaftMax=d0+ES, shaftMin=shaftMax-T;

  const refMin=Math.min(boreMin,shaftMin);
  const refMax=Math.max(boreMax,shaftMax);
  const span=refMax-refMin;

  const graphWidth = document.getElementById("graph").clientWidth - 160;
  const scale = graphWidth/span;

  const boreLeft=(boreMin-refMin)*scale + 80;
  const shaftLeft=(shaftMin-refMin)*scale + 80;

  boreBar.style.left=boreLeft+"px";
  boreBar.style.width=(T*scale)+"px";

  shaftBar.style.left=shaftLeft+"px";
  shaftBar.style.width=(T*scale)+"px";

  boreLabel.style.left=(boreLeft + T*scale/2)+"px";
  shaftLabel.style.left=(shaftLeft + T*scale/2)+"px";

  boreLabel.innerText=`Bohrung ${hole.value}7: ${(EB*1000).toFixed(0)} / ${((EB+T)*1000).toFixed(0)} µm`;
  shaftLabel.innerText=`Welle ${shaft.value}7: ${((ES-T)*1000).toFixed(0)} / ${(ES*1000).toFixed(0)} µm`;
}
</script>

</body>
</html>
``
