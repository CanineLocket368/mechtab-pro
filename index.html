<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>ISO‑Passungsrechner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial,system-ui,Segoe UI;
  background:#f3f4f6;
  padding:20px;
}
.card{
  max-width:600px;
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  margin:auto;
}
h1{margin-top:0}
input,select{
  width:100%;
  padding:8px;
  margin:6px 0 14px 0;
}
.result{
  background:#f9fafb;
  padding:12px;
  border-radius:10px;
}
.good{color:green}
.bad{color:red}
small{color:#666}
</style>
</head>

<body>

<div class="card">
  <h1>ISO‑Passungsrechner</h1>
  <small>Richtwerte nach ISO 286 – Ausbildungs‑ & Praxisnah</small>

  <label>Nennmaß [mm]</label>
  <input type="number" id="nenn" value="20">

  <label>Bohrung (z. B. H7)</label>
  <select id="bohrung">
    <option value="H7">H7</option>
    <option value="H8">H8</option>
    <option value="H9">H9</option>
  </select>

  <label>Welle (z. B. h6)</label>
  <select id="welle">
    <option value="h6">h6</option>
    <option value="h7">h7</option>
    <option value="f7">f7</option>
    <option value="k6">k6</option>
  </select>

  <button onclick="rechnen()">Berechnen</button>

  <div class="result" id="out"></div>
</div>

<script>
/* ===================================================
   ISO‑TOLERANZEN (vereinfachte Richtwerte)
   Einheit: mm
   =================================================== */

const IT = {
  6: d => 0.010,
  7: d => 0.016,
  8: d => 0.025,
  9: d => 0.040
};

const shaftDeviation = {
  h: d => 0,
  f: d => -0.025,
  k: d => +0.010
};

function rechnen(){
  const d = Number(document.getElementById("nenn").value);
  const bore = document.getElementById("bohrung").value;
  const shaft = document.getElementById("welle").value;

  const boreIT = Number(bore.replace("H",""));
  const shaftIT = Number(shaft.replace(/[a-z]/gi,""));
  const shaftPos = shaft[0];

  const TB = IT[boreIT](d);
  const TS = IT[shaftIT](d);
  const ES = shaftDeviation[shaftPos](d);

  const boreMin = d;
  const boreMax = d + TB;

  const shaftMax = d + ES;
  const shaftMin = shaftMax - TS;

  const minClear = (boreMin - shaftMax).toFixed(3);
  const maxClear = (boreMax - shaftMin).toFixed(3);

  let type = "";
  if(maxClear < 0) type = "<span class='bad'>Presspassung</span>";
  else if(minClear > 0) type = "<span class='good'>Spielpassung</span>";
  else type = "Übergangspassung";

  document.getElementById("out").innerHTML = `
  <h3>Ergebnis</h3>
  <b>Bohrung:</b><br>
  ${boreMin.toFixed(3)} … ${boreMax.toFixed(3)} mm<br><br>

  <b>Welle:</b><br>
  ${shaftMin.toFixed(3)} … ${shaftMax.toFixed(3)} mm<br><br>

  <b>Spiel / Übermaß:</b><br>
  min: ${minClear} mm<br>
  max: ${maxClear} mm<br><br>

  <b>Passungsart:</b> ${type}
  `;
}
</script>

</body>
</html>
<div class="card">
  <h2>Allgemeintoleranz‑Rechner (ISO 2768)</h2>
  <small>Richtwerte nach ISO 2768 – Ausbildungs‑ & Praxisnah</small>

  <label>Nennmaß [mm]</label>
  <input type="number" id="isoNenn" placeholder="z. B. 120">

  <label>Toleranzklasse</label>
  <select id="isoKlasse">
    <option value="f">fein (f)</option>
    <option value="m" selected>mittel (m)</option>
    <option value="c">grob (c)</option>
    <option value="v">sehr grob (v)</option>
  </select>

  <button onclick="iso2768()">Berechnen</button>

  <div id="isoOut" style="margin-top:10px"></div>
</div>

<script>
function iso2768(){
  const d = Math.abs(Number(document.getElementById("isoNenn").value));
  const k = document.getElementById("isoKlasse").value;

  if(!d){
    document.getElementById("isoOut").innerHTML = "Bitte gültiges Maß eingeben.";
    return;
  }

  // ISO 2768 Richtwerte (Längenmaße)
  const table = {
    f:  [[6,0.05],[30,0.1],[120,0.15],[400,0.2],[1000,0.3],[Infinity,0.5]],
    m:  [[6,0.1],[30,0.2],[120,0.3],[400,0.5],[1000,0.8],[Infinity,1.2]],
    c:  [[6,0.2],[30,0.5],[120,0.8],[400,1.2],[1000,2.0],[Infinity,3.0]],
    v:  [[6,0.5],[30,1.0],[120,1.5],[400,2.5],[1000,4.0],[Infinity,6.0]]
  };

  let tol = 0;
  for(const [limit, t] of table[k]){
    if(d <= limit){ tol = t; break; }
  }

  const min = (d - tol).toFixed(3);
  const max = (d + tol).toFixed(3);

  document.getElementById("isoOut").innerHTML = `
    <b>Ergebnis:</b><br>
    Nennmaß: ${d.toFixed(3)} mm<br>
    Toleranz: ±${tol} mm<br><br>
    Maßbereich:<br>
    <b>${min} … ${max} mm</b>
  `;
}
</script>
