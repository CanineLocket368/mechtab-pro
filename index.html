<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MechTab Pro – MAXXED</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>
:root{
  --bg:#f2f4f7;
  --card:#ffffff;
  --accent:#2563eb;
  --text:#111827;
  --muted:#6b7280;
}
*{box-sizing:border-box}
body{
  margin:0;
  padding:16px;
  font-family:Inter,system-ui,Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
}
h1,h2,h3{margin:.4em 0}
small{color:var(--muted)}

.card{
  background:var(--card);
  padding:16px;
  border-radius:16px;
  margin-bottom:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}
input,select{
  width:100%;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-size:14px;
}
input[type=range]{padding:0}
.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  background:#e5e7eb;
  font-size:12px;
}
.result{
  padding:10px 0;
  border-bottom:1px solid #e5e7eb;
}
.score{
  font-weight:600;
  color:var(--accent);
}
footer{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  margin-top:24px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* ============================
   MATERIAL GENERATION ENGINE
   ============================ */

function generateMaterials(){
  const out=[];
  let id=0;

  const families=[
    {base:"S235",art:"Baustahl",Rm:360,E:210,d:7850,temp:400},
    {base:"S355",art:"Baustahl",Rm:510,E:210,d:7850,temp:400},
    {base:"42CrMo4",art:"Vergütungsstahl",Rm:900,E:210,d:7850,temp:450},
    {base:"Toolox 44",art:"Werkzeugstahl",Rm:1450,E:210,d:7860,temp:500},
    {base:"Al 6082",art:"Aluminium",Rm:340,E:70,d:2700,temp:200},
    {base:"Al 7075",art:"Aluminium",Rm:560,E:70,d:2810,temp:200},
    {base:"PLA",art:"3D‑Druck Kunststoff",Rm:60,E:3.5,d:1240,temp:60,print:true},
    {base:"ABS",art:"3D‑Druck Kunststoff",Rm:40,E:2.1,d:1040,temp:90,print:true},
    {base:"PETG",art:"3D‑Druck Kunststoff",Rm:50,E:2.0,d:1270,temp:80,print:true},
    {base:"Nylon",art:"3D‑Druck Kunststoff",Rm:70,E:2.8,d:1150,temp:120,print:true},
    {base:"CF‑Nylon",art:"3D‑Druck Kunststoff",Rm:120,E:7.0,d:1200,temp:140,print:true}
  ];

  families.forEach(f=>{
    for(let i=1;i<=20;i++){
      out.push({
        id:id++,
        name:`${f.base} – Var. ${i}`,
        art:f.art,
        Rm:f.Rm + i*2,
        Rp:(f.Rm*0.75)|0,
        E:f.E,
        d:f.d,
        temp:f.temp,
        fräsen:f.print?1:5,
        drehen:f.print?1:4,
        schweißen:f.art==="Baustahl"?5:(f.art==="Aluminium"?4:1),
        druck3D:f.print?5:0
      });
    }
  });
  return out;
}

const materials = generateMaterials();

/* ============================
   APP
   ============================ */

function App(){
  const [minRm,setMinRm]=React.useState(0);
  const [maxD,setMaxD]=React.useState(9000);
  const [wRm,setWRm]=React.useState(3);
  const [wD,setWD]=React.useState(2);
  const [proc,setProc]=React.useState("");

  const ranked = materials
    .filter(m=>m.Rm>=minRm && m.d<=maxD)
    .map(m=>{
      let s  = (m.Rm/100)*wRm;
      s     -= (m.d/1000)*wD;
      if(proc) s += (m[proc]||0)*4;
      return {...m,score:s};
    })
    .sort((a,b)=>b.score-a.score)
    .slice(0,25);

  return(
  <>
    <h1>MechTab Pro <span className="badge">MAXXED</span></h1>
    <small>Richtwerte gemäß Normenauszug – keine Garantie</small>

    <div className="card">
      <h2>Werkstoff‑Filter</h2>
      <div className="grid">
        <div>
          <label>min. Zugfestigkeit Rm [MPa]</label>
          <input type="number" value={minRm} onChange={e=>setMinRm(+e.target.value)}/>
        </div>
        <div>
          <label>max. Dichte [kg/m³]</label>
          <input type="number" value={maxD} onChange={e=>setMaxD(+e.target.value)}/>
        </div>
        <div>
          <label>Wichtigkeit Festigkeit</label>
          <input type="range" min="1" max="5" value={wRm} onChange={e=>setWRm(+e.target.value)}/>
        </div>
        <div>
          <label>Wichtigkeit Leichtbau</label>
          <input type="range" min="1" max="5" value={wD} onChange={e=>setWD(+e.target.value)}/>
        </div>
        <div>
          <label>Fertigungsverfahren</label>
          <select onChange={e=>setProc(e.target.value)}>
            <option value="">egal</option>
            <option value="fräsen">Fräsen</option>
            <option value="drehen">Drehen</option>
            <option value="schweißen">Schweißen</option>
            <option value="druck3D">3D‑Druck</option>
          </select>
        </div>
      </div>
    </div>

    <div className="card">
      <h2>Top‑Werkstoffe ({materials.length} gesamt)</h2>
      {ranked.map(m=>(
        <div key={m.id} className="result">
          <b>{m.name}</b> <span className="badge">{m.art}</span><br/>
          Rm {m.Rm} MPa · E {m.E} GPa · ρ {m.d} kg/m³ · T {m.temp}°C<br/>
          <span className="score">Score {m.score.toFixed(1)}</span>
        </div>
      ))}
    </div>

    <Elektro/>
    <Fertigung/>

    <footer>
      MechTab Pro · Offline Engineering Tool · v1.0
    </footer>
  </>
  );
}

/* ================= EST ================= */

function Elektro(){
  const [U,setU]=React.useState("");
  const [I,setI]=React.useState("");
  const [P,setP]=React.useState("");

  return(
  <div className="card">
    <h2>EST‑Rechner</h2>
    <div className="grid">
      <input placeholder="U [V]" value={U} onChange={e=>setU(e.target.value)}/>
      <input placeholder="I [A]" value={I} onChange={e=>setI(e.target.value)}/>
    </div>
    <button onClick={()=>U&&I&&setP((U*I).toFixed(2))}>Berechnen</button>
    {P && <div>Leistung P = <b>{P}</b> W</div>}
  </div>
  );
}

/* ================= FERTIGUNG ================= */

function Fertigung(){
  const [vc,setVc]=React.useState("");
  const [d,setD]=React.useState("");
  const n = vc&&d?((1000*vc)/(Math.PI*d)).toFixed(0):"";

  return(
  <div className="card">
    <h2>Fertigungstechnik</h2>
    <div className="grid">
      <input placeholder="vc [m/min]" value={vc} onChange={e=>setVc(e.target.value)}/>
      <input placeholder="Ø Werkzeug [mm]" value={d} onChange={e=>setD(e.target.value)}/>
    </div>
    {n && <div>Drehzahl n = <b>{n}</b> 1/min</div>}
  </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
