  const a=rMin(mv),b=rMax(mv);

const QD=["","Sehr schlecht","Schlecht","Bedingt","Gut","Sehr gut"];

function useW(){const[w,setW]=useState(window.innerWidth);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return w;}

function NI({value,onChange}){
  return <input type="number" value={value} onChange={e=>onChange(e.target.value===""?0:Number(e.target.value))}
    style={{width:"100%",background:"#111",border:"1px solid #2a2a2a",color:"#f0f0f0",padding:"6px 8px",borderRadius:5,fontSize:12,fontFamily:"monospace"}}/>;
}
function RF({label,unit,lo,hi,onLo,onHi}){
  return <div style={{marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
      <span style={{fontSize:10,color:"#d0d0d0",textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</span>
      <span style={{fontSize:10,color:"#f59e0b",fontFamily:"monospace"}}>{lo||"–"} / {hi||"–"} {unit}</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
      <div><div style={{fontSize:9,color:"#b0b0b0",marginBottom:2}}>MIN (0 = egal)</div><NI value={lo} onChange={onLo}/></div>
      <div><div style={{fontSize:9,color:"#b0b0b0",marginBottom:2}}>MAX (0 = egal)</div><NI value={hi} onChange={onHi}/></div>
    </div>
  </div>;
}
function SF({label,value,onChange}){
  return <div style={{marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
      <span style={{fontSize:10,color:"#d0d0d0",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</span>
      <span style={{fontSize:10,color:"#f59e0b"}}>{value===0?"alle (★)":QD[value]}</span>
    </div>
    <div style={{display:"flex",gap:3}}>
      <button onClick={()=>onChange(0)} style={{flex:1,padding:"5px 0",borderRadius:4,fontSize:10,cursor:"pointer",fontWeight:700,
        background:value===0?"#f59e0b22":"#111",border:value===0?"1px solid #f59e0b88":"1px solid #2a2a2a",color:value===0?"#f59e0b":"#d0d0d0"}}>Alle</button>
      {[1,2,3,4,5].map(n=><button key={n} onClick={()=>onChange(n)} style={{flex:1,padding:"5px 0",borderRadius:4,fontSize:11,cursor:"pointer",
        background:value===n?"#f59e0b22":"#111",border:value===n?"1px solid #f59e0b88":"1px solid #2a2a2a",color:value===n?"#f59e0b":"#888"}}>{"★".repeat(n)}</button>)}
    </div>
  </div>;
}
function Bar({val,mx,color}){return <div style={{background:"#1c1c1c",borderRadius:2,height:3,overflow:"hidden",marginTop:3}}><div style={{width:`${Math.min(100,(rMax(val)/mx)*100)}%`,height:"100%",background:color,borderRadius:2}}/></div>;}
function Tag({ch,cat}){const c=CAT[cat]||CAT["Stahl"];return <span style={{fontSize:10,padding:"2px 8px",borderRadius:999,background:c.bg,color:c.text,border:`1px solid ${c.border}55`,letterSpacing:"0.05em",fontWeight:700,whiteSpace:"nowrap"}}>{ch}</span>;}
function QD2({val,color}){if(!val)return <span style={{fontSize:10,color:"#555"}}>—</span>;return <span style={{fontSize:10,letterSpacing:1,color:color}}>{'★'.repeat(val)}{'☆'.repeat(5-val)}</span>;}

function Card({mat,onClick,mob}){
  const c=CAT[mat.cat]||CAT["Stahl"];
  const[hov,setHov]=useState(false);
  return <div onClick={()=>onClick(mat)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{background:hov?c.bg:"#0d0d0d",border:`1px solid ${hov?c.border+"aa":c.border+"28"}`,borderRadius:10,padding:mob?"13px":"15px 17px",cursor:"pointer",transition:"all 0.18s"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:8}}>
      <div style={{minWidth:0}}>
        <div style={{fontSize:mob?13:14,fontWeight:700,color:"#f0f0f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mat.name}</div>
        <div style={{fontSize:10,color:"#c0c0c0",marginTop:1}}>{mat.sub}</div>
      </div>
      <Tag ch={mat.cat} cat={mat.cat}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 12px",marginBottom:10}}>
      {[["tensile",2200,"Zugfestigkeit"],["yield",2200,"Streckgrenze"],["tmax",1100,"Temp. max"],["dens",22,"Dichte"]].map(([k,mx,lb])=>(
        <div key={k}>
          <div style={{display:"flex",justifyContent:"space-between",gap:4}}>
            <span style={{fontSize:10,color:"#c0c0c0",flexShrink:0}}>{lb}</span>
            <span style={{fontSize:10,color:"#f0f0f0",fontFamily:"monospace",textAlign:"right",fontWeight:600,whiteSpace:"nowrap"}}>{fmtR(mat[k])} {PU[k]}</span>
          </div>
          <Bar val={mat[k]} mx={mx} color={c.text}/>
        </div>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"3px 6px",borderTop:`1px solid ${c.border}22`,paddingTop:8}}>
      {Object.entries(QL).map(([k,lb])=>(
        <div key={k}>
          <div style={{fontSize:9,color:"#909090",marginBottom:2}}>{lb.replace("beständigkeit","best.").replace("barkeit","b.")}</div>
          <QD2 val={mat[k]} color={c.text}/>
        </div>
      ))}
    </div>
    {mat.pT&&<div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:5}}>
      <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"rgba(124,58,237,0.12)",color:"#a78bfa",border:"1px solid #7c3aed33"}}>🌡 {mat.pT}°C Düse</span>
      {mat.bT>0&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"rgba(124,58,237,0.12)",color:"#a78bfa",border:"1px solid #7c3aed33"}}>🛏 {mat.bT}°C Bett</span>}
    </div>}
    {mat.cat==="3D-Druck"&&mat.pT===null&&<div style={{marginTop:8}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"rgba(124,58,237,0.1)",color:"#c0b0e8",border:"1px solid #7c3aed22"}}>Pulver / Harz-Verfahren</span></div>}
  </div>;
}

function Modal({mat,onClose,mob}){
  const[drv,setDrv]=useState(null);       // which property is the driver key
  const[drvVal,setDrvVal]=useState(null); // numeric value set by user
  useEffect(()=>{
    if(!mat)return;
    document.body.style.overflow="hidden";
    setDrv(null);setDrvVal(null); // reset on new material
    return()=>{document.body.style.overflow="";};
  },[mat]);
  if(!mat)return null;
  const c=CAT[mat.cat]||CAT["Stahl"];
  const comp=Object.entries(mat.comp||{});
  const PKEYS=["tensile","yield","elong","dens","mod","tmax","tmin","tcond","texp"];

  // Which properties have a meaningful range?
  const isRng=v=>Array.isArray(v)&&v[0]!==v[1];
  // Driver candidates: hard, tensile, yield (in priority order)
  const drvCands=[
    isRng(mat.hard)&&{key:"hard",label:`Härte (${mat.hardU})`,min:rMin(mat.hard),max:rMax(mat.hard),step:mat.hardU==="HRC"?0.5:1},
    isRng(mat.tensile)&&{key:"tensile",label:"Zugfestigkeit (MPa)",min:rMin(mat.tensile),max:rMax(mat.tensile),step:10},
    isRng(mat.yield)&&{key:"yield",label:"Streckgrenze (MPa)",min:rMin(mat.yield),max:rMax(mat.yield),step:10},
    isRng(mat.elong)&&{key:"elong",label:"Bruchdehnung (%)",min:rMin(mat.elong),max:rMax(mat.elong),step:0.5},
  ].filter(Boolean);
  const canInterp=drvCands.length>0;
  const activeDrv=drvCands.find(d=>d.key===drv)||drvCands[0];

  // t = position 0 (soft) → 1 (hard) in the driver's range
  // For elong, higher value = softer, so t is inverted
  let t=null;
  if(drvVal!==null&&activeDrv){
    const raw=(drvVal-activeDrv.min)/(activeDrv.max-activeDrv.min);
    t=activeDrv.key==="elong"?1-Math.max(0,Math.min(1,raw)):Math.max(0,Math.min(1,raw));
  }

  // Interpolate a property value given t
  // Properties that INCREASE with hardness: tensile, yield, hard → use t directly
  // Properties that DECREASE with hardness: elong → use (1-t)
  function calcInterp(key){
    if(t===null)return null;
    const v=key==="hard"?mat.hard:mat[key];
    if(!isRng(v))return rMin(v); // single value stays constant
    const inverse=(key==="elong");
    const res=inverse?(v[1]-t*(v[1]-v[0])):(v[0]+t*(v[1]-v[0]));
    return Math.round(res*10)/10;
  }

  // Display value: interpolated if t set, otherwise range string
  function disp(key){
    const iv=calcInterp(key);
    return iv!==null?`${iv}`:fmtR(key==="hard"?mat.hard:mat[key]);
  }

  // Is a displayed value interpolated (i.e. specific, not a range)?
  const specific=t!==null;

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.87)",zIndex:1000,display:"flex",alignItems:mob?"flex-end":"center",justifyContent:"center",padding:mob?0:20,backdropFilter:"blur(4px)"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#0d0d0d",border:`1px solid ${c.border}55`,borderRadius:mob?"16px 16px 0 0":12,width:"100%",maxWidth:mob?"100%":700,maxHeight:mob?"90vh":"87vh",overflowY:"auto",padding:mob?"24px 18px 36px":"28px 30px"}}>
      {mob&&<div style={{width:36,height:4,background:"#2a2a2a",borderRadius:2,margin:"0 auto 20px"}}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,gap:12}}>
        <div>
          <div style={{fontSize:mob?19:22,fontWeight:800,color:"#f0f0f0",letterSpacing:"-0.02em"}}>{mat.name}</div>
          <div style={{fontSize:12,color:c.text,marginTop:3}}>{mat.cat} · {mat.sub}</div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"1px solid #2a2a2a",color:"#e0e0e0",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12,flexShrink:0}}>✕ Schließen</button>
      </div>
      <p style={{fontSize:13,color:"#d0d0d0",lineHeight:1.65,marginBottom:20}}>{mat.desc}</p>

      {/* ── ZUSTAND EINSTELLEN (nur wenn Wertebereiche vorhanden) ─────────────── */}
      {canInterp&&<div style={{background:"#0a0a14",border:`1px solid ${c.border}55`,borderRadius:10,padding:"16px 18px",marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:c.text,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.09em"}}>
            ⚙ Zustand / Wärmebehandlung
          </span>
          {specific&&<button onClick={()=>{setDrvVal(null);}} style={{fontSize:10,color:"#f59e0b",background:"none",border:"1px solid #f59e0b44",borderRadius:5,padding:"3px 9px",cursor:"pointer"}}>
            ↺ Bereich anzeigen
          </button>}
        </div>

        {/* Driver-Auswahl */}
        {drvCands.length>1&&<div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>
          {drvCands.map(d=><button key={d.key} onClick={()=>{setDrv(d.key);setDrvVal(null);}}
            style={{padding:"4px 10px",borderRadius:5,fontSize:10,cursor:"pointer",fontWeight:600,
              background:activeDrv?.key===d.key?c.bg:"#111",
              border:activeDrv?.key===d.key?`1px solid ${c.border}88`:"1px solid #2a2a2a",
              color:activeDrv?.key===d.key?c.text:"#d0d0d0"}}>{d.label}</button>)}
        </div>}

        {/* Slider + Eingabe */}
        {activeDrv&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:10,color:"#d0d0d0"}}>{activeDrv.label}</span>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input type="number" min={activeDrv.min} max={activeDrv.max} step={activeDrv.step}
                value={drvVal!==null?drvVal:""} placeholder={`${activeDrv.min} – ${activeDrv.max}`}
                onChange={e=>setDrvVal(e.target.value===""?null:Math.max(activeDrv.min,Math.min(activeDrv.max,Number(e.target.value))))}
                style={{width:90,background:"#111",border:`1px solid ${c.border}55`,color:c.text,padding:"4px 8px",borderRadius:5,fontSize:12,fontFamily:"monospace",textAlign:"right"}}/>
              <span style={{fontSize:10,color:"#888"}}>{activeDrv.key==="hard"?mat.hardU:PU[activeDrv.key]||""}</span>
            </div>
          </div>
          <input type="range" min={activeDrv.min} max={activeDrv.max} step={activeDrv.step}
            value={drvVal!==null?drvVal:activeDrv.min}
            onChange={e=>setDrvVal(Number(e.target.value))}
            style={{accentColor:c.text}}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#555",marginTop:2}}>
            <span>{activeDrv.min} (weich/geglüht)</span><span>(hart/vergütet) {activeDrv.max}</span>
          </div>
        </div>}

        {/* Ergebnis: berechnete Einzelwerte */}
        {specific&&<div style={{marginTop:14,padding:"12px 14px",background:c.bg,borderRadius:8,border:`1px solid ${c.border}33`}}>
          <div style={{fontSize:9,color:"#b0b0b0",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.08em"}}>
            Berechnete Einzelwerte bei diesem Zustand (lineare Interpolation)
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,flexWrap:"wrap"}}>
            {[["tensile","Zugf.","MPa"],["yield","Streck.","MPa"],["elong","Dehnung","%"],["hard","Härte",mat.hardU]].map(([k,lb,u])=>{
              const iv=calcInterp(k);
              if(iv===null)return null;
              const isDriver=activeDrv?.key===k;
              return <div key={k} style={{opacity:isDriver?1:1}}>
                <div style={{fontSize:9,color:"#b0b0b0",marginBottom:3}}>{lb}</div>
                <div style={{fontSize:17,fontWeight:800,color:isDriver?"#ffffff":c.text,fontFamily:"monospace",lineHeight:1}}>{iv}</div>
                <div style={{fontSize:9,color:"#888",marginTop:2}}>{u}</div>
              </div>;
            }).filter(Boolean)}
          </div>
          <div style={{fontSize:9,color:"#666",marginTop:10,borderTop:"1px solid #ffffff11",paddingTop:8}}>
            ℹ Werte sind lineare Interpolation innerhalb des Bereichs – tatsächliche Werte können je nach Legierungscharge abweichen.
          </div>
        </div>}
      </div>}

      {/* ── QUALITATIVE EIGENSCHAFTEN ─────────────────────────────────────────── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
        {Object.entries(QL).map(([k,lb])=>(
          <div key={k} style={{background:"#111",border:`1px solid ${c.border}33`,borderRadius:7,padding:"12px 14px"}}>
            <div style={{fontSize:9,color:"#b0b0b0",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.08em"}}>{lb}</div>
            <div style={{fontSize:15,color:c.text,letterSpacing:2}}>{mat[k]?'★'.repeat(mat[k])+'☆'.repeat(5-mat[k]):<span style={{color:"#555"}}>N/A</span>}</div>
            <div style={{fontSize:9,color:"#888",marginTop:3}}>{mat[k]?QD[mat[k]]:"Nicht anwendbar"}</div>
          </div>
        ))}
      </div>

      {/* ── PHYSIKALISCHE EIGENSCHAFTEN ───────────────────────────────────────── */}
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(4,1fr)",gap:8,marginBottom:20}}>
        {[...PKEYS,"hard"].map(k=>{
          const isH=k==="hard";
          const rawV=isH?mat.hard:mat[k];
          const lb=isH?"Härte":PL[k];
          const u=isH?mat.hardU:PU[k];
          const interpV=specific?(isH?calcInterp("hard"):calcInterp(k)):null;
          const showRange=!specific||interpV===null;
          return <div key={k} style={{background:"#111",border:interpV!==null?`1px solid ${c.border}44`:"1px solid #1e1e1e",borderRadius:7,padding:"10px 12px",position:"relative"}}>
            <div style={{fontSize:9,color:"#b0b0b0",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>{lb}</div>
            {interpV!==null
              ?<>
                  <div style={{fontSize:15,fontWeight:800,color:c.text,fontFamily:"monospace",lineHeight:1.2}}>{interpV}</div>
                  <div style={{fontSize:9,color:"#666",fontFamily:"monospace",marginTop:1,textDecoration:"line-through"}}>{fmtR(rawV)}</div>
                </>
              :<div style={{fontSize:Array.isArray(rawV)?12:15,fontWeight:700,color:c.text,fontFamily:"monospace",lineHeight:1.2}}>{fmtR(rawV)}</div>
            }
            <div style={{fontSize:9,color:"#a0a0a0",marginTop:2}}>{u}</div>
          </div>;
        })}
      </div>

      {/* ── ZUSAMMENSETZUNG ───────────────────────────────────────────────────── */}
      {comp.length>0&&<div style={{marginBottom:16}}>
        <div style={{fontSize:10,color:"#c0c0c0",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.08em"}}>Chemische Zusammensetzung</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {comp.map(([el,pct])=><div key={el} style={{background:c.bg,border:`1px solid ${c.border}44`,borderRadius:7,padding:"7px 12px",display:"flex",flexDirection:"column",alignItems:"center",minWidth:52}}>
            <span style={{fontSize:14,fontWeight:800,color:c.text}}>{el}</span>
            <span style={{fontSize:11,color:"#d0d0d0",fontFamily:"monospace"}}>{pct}%</span>
          </div>)}
        </div>
      </div>}

      {/* ── 3D-DRUCK ──────────────────────────────────────────────────────────── */}
      {mat.cat==="3D-Druck"&&<div style={{background:"rgba(124,58,237,0.07)",border:"1px solid #7c3aed33",borderRadius:8,padding:"14px 16px"}}>
        <div style={{fontSize:10,color:"#a78bfa",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.08em"}}>3D-Druck Parameter</div>
        {mat.pT?<div style={{display:"flex",gap:28}}>
          <div><div style={{fontSize:10,color:"#d0d0d0"}}>Düsentemperatur</div><div style={{fontSize:20,fontWeight:700,color:"#a78bfa",fontFamily:"monospace"}}>{mat.pT} °C</div></div>
          {mat.bT>0&&<div><div style={{fontSize:10,color:"#d0d0d0"}}>Betttemperatur</div><div style={{fontSize:20,fontWeight:700,color:"#a78bfa",fontFamily:"monospace"}}>{mat.bT} °C</div></div>}
        </div>:<div style={{fontSize:13,color:"#d0d0d0"}}>Pulver- oder Harzbasiertes Verfahren (SLS / SLA / MSLA / LPBF) — keine Extruder-Parameter.</div>}
      </div>}
    </div>
  </div>;
}

function FPanel({state,dispatch,count,total,mob,onClose}){
  const{tensile,yld,tmax,tmin,dens,comp,search,cat,sw,kr,bk}=state;
  const cats=["Alle","Stahl","Metall","Kunststoff","3D-Druck"];
  const LS={fontSize:10,color:"#d0d0d0",textTransform:"uppercase",letterSpacing:"0.08em"};
  return <div style={{padding:mob?"0 16px 28px":"18px 16px",overflowY:"auto",height:mob?"auto":"100%"}}>
    {mob
      ?<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <span style={{fontSize:14,fontWeight:700,color:"#f0f0f0"}}>Filter</span>
          <button onClick={onClose} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#e0e0e0",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:12}}>Fertig</button>
        </div>

        style={{width:"100%",background:"#111",border:"1px solid #2a2a2a",color:"#f0f0f0",padding:"8px 10px",borderRadius:6,fontSize:13,fontFamily:"inherit"}}/></div>
    <div style={{marginBottom:14}}><div style={{...LS,marginBottom:7}}>Kategorie</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {cats.map(c=>{const col=CAT[c];const a=cat===c;return <button key={c} onClick={()=>dispatch({type:"cat",v:c})}
          style={{padding:"5px 11px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",
            background:a?(col?.bg||"#1a1a1a"):"transparent",border:a?`1px solid ${col?.border||"#f59e0b"}66`:"1px solid #222",
            color:a?(col?.text||"#f59e0b"):"#d0d0d0",transition:"all 0.15s"}}>{c}</button>;})}
      </div></div>
    <div style={{borderTop:"1px solid #181818",paddingTop:14}}>

      <RF label="Streckgrenze" unit="MPa" lo={yld[0]} hi={yld[1]} onLo={v=>dispatch({type:"yld",v:[v,yld[1]]})} onHi={v=>dispatch({type:"yld",v:[yld[0],v]})}/>
    </div>
    <div style={{borderTop:"1px solid #181818",paddingTop:14,marginTop:4}}>
      <div style={{...LS,marginBottom:12}}>Temperatur</div>

      <RF label="Temp. min" unit="°C" lo={tmin[0]} hi={tmin[1]} onLo={v=>dispatch({type:"tmin",v:[v,tmin[1]]})} onHi={v=>dispatch({type:"tmin",v:[tmin[0],v]})}/>
    </div>

    </div>
    <div style={{borderTop:"1px solid #181818",paddingTop:14,marginTop:4}}>

      <SF label="Korrosionsbeständigkeit" value={kr} onChange={v=>dispatch({type:"kr",v})}/>

  </div>;
}

// Alle Filter standardmäßig 0
const INIT={tensile:[0,0],yld:[0,0],tmax:[0,0],tmin:[0,0],dens:[0,0],sw:0,kr:0,bk:0,comp:"",search:"",cat:"Alle"};
function reducer(s,a){if(a.type==="reset")return{...INIT};return{...s,[a.type]:a.v};}

function App(){
  const width=useW();const mob=width<768;const tab=width<1100;
  const[state,dispatch]=React.useReducer(reducer,INIT);
  const[sel,setSel]=useState(null);const[fo,setFo]=useState(false);

  const filtered=useMemo(()=>MATS.filter(m=>{
    if(state.cat!=="Alle"&&m.cat!==state.cat)return false;
    const q=state.search.toLowerCase();
    if(q&&!m.name.toLowerCase().includes(q)&&!m.sub.toLowerCase().includes(q))return false;
    if(!matchF(m.tensile,state.tensile[0],state.tensile[1]))return false;
    if(!matchF(m.yield,  state.yld[0],    state.yld[1]))   return false;
    if(!matchF(m.tmax,   state.tmax[0],   state.tmax[1]))  return false;
    if(!matchF(m.tmin,   state.tmin[0],   state.tmin[1]))  return false;
    if(!matchF(m.dens,   state.dens[0],   state.dens[1]))  return false;
    if(!matchQ(m.sw,state.sw))return false;
    if(!matchQ(m.kr,state.kr))return false;
    if(!matchQ(m.bk,state.bk))return false;
    if(state.comp.trim()){const el=state.comp.trim().toUpperCase();if(!Object.keys(m.comp||{}).map(k=>k.toUpperCase()).includes(el))return false;}
    return true;
  }),[state]);

  const cols=mob?1:tab?2:3;
  const counts=useMemo(()=>{const c={};MATS.forEach(m=>{c[m.cat]=(c[m.cat]||0)+1;});return c;},[]);
  const anyF=state.comp||state.search||state.cat!=="Alle"||state.sw||state.kr||state.bk||
    [...state.tensile,...state.yld,...state.tmax,...state.tmin,...state.dens].some(v=>v);

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#080808"}}>
    <header style={{background:"#0a0a0a",borderBottom:"1px solid #141414",padding:mob?"11px 14px":"13px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:200,gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{width:30,height:30,borderRadius:7,flexShrink:0,background:"linear-gradient(135deg,#f59e0b,#92400e)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>⚙</div>
        <div>
          <div style={{fontSize:mob?14:16,fontWeight:800,letterSpacing:"-0.02em",color:"#f0f0f0",lineHeight:1}}>WERKSTOFF<span style={{color:"#f59e0b"}}>DB</span></div>
          {!mob&&<div style={{fontSize:10,color:"#d0d0d0",letterSpacing:"0.1em",textTransform:"uppercase"}}>{MATS.length} Werkstoffe · Technische Datenbank</div>}
        </div>
      </div>
      {!mob&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {["Alle","Stahl","Metall","Kunststoff","3D-Druck"].map(c=>{const col=CAT[c];const a=state.cat===c;
          return <button key={c} onClick={()=>dispatch({type:"cat",v:c})} style={{padding:"5px 13px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",
            background:a?(col?.bg||"#1a1a1a"):"transparent",border:a?`1px solid ${col?.border||"#f59e0b"}66`:"1px solid #1e1e1e",color:a?(col?.text||"#f59e0b"):"#d0d0d0",transition:"all 0.15s"}}>
            {c}{c!=="Alle"&&<span style={{marginLeft:5,opacity:0.7,fontSize:10}}>{counts[c]||0}</span>}
          </button>;})}
      </div>}
      {mob&&<button onClick={()=>setFo(true)} style={{background:"#111",border:"1px solid #252525",color:"#f0f0f0",borderRadius:8,padding:"8px 13px",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:6,fontWeight:600}}>
        ⚡ Filter {anyF&&<span style={{width:7,height:7,borderRadius:"50%",background:"#f59e0b"}}/>}
      </button>}
    </header>

    {mob&&<div style={{background:"#0a0a0a",borderBottom:"1px solid #141414",padding:"9px 14px",display:"flex",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
      {["Alle","Stahl","Metall","Kunststoff","3D-Druck"].map(c=>{const col=CAT[c];const a=state.cat===c;
        return <button key={c} onClick={()=>dispatch({type:"cat",v:c})} style={{padding:"6px 13px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap",
          background:a?(col?.bg||"#1a1a1a"):"#111",border:a?`1px solid ${col?.border||"#f59e0b"}66`:"1px solid #1e1e1e",color:a?(col?.text||"#f59e0b"):"#d0d0d0"}}>{c}</button>;})}
    </div>}

    <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
      {!mob&&<aside style={{width:252,background:"#0a0a0a",borderRight:"1px solid #141414",flexShrink:0,overflowY:"auto",height:"calc(100vh - 57px)",position:"sticky",top:57}}>
        <FPanel state={state} dispatch={dispatch} count={filtered.length} total={MATS.length} mob={false}/>
      </aside>}

      <main style={{flex:1,overflowY:"auto",padding:mob?"12px":"20px 22px"}}>
        {mob&&<div style={{marginBottom:12}}>
          <input value={state.search} onChange={e=>dispatch({type:"search",v:e.target.value})} placeholder="🔍  Werkstoff suchen…"
            style={{width:"100%",background:"#111",border:"1px solid #252525",color:"#f0f0f0",padding:"10px 14px",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
        </div>}
        <div style={{marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:"#d0d0d0"}}><span style={{color:"#f59e0b",fontWeight:700}}>{filtered.length}</span> Ergebnisse{state.cat!=="Alle"&&<span style={{color:"#b0b0b0"}}> · {state.cat}</span>}</span>
          {!mob&&<div style={{display:"flex",gap:10}}>{Object.entries(CAT).map(([cat,col])=>(
            <div key={cat} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#c0c0c0"}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:col.dot}}/>{cat} ({counts[cat]||0})
            </div>))}
          </div>}
        </div>
        {filtered.length===0
          ?<div style={{textAlign:"center",padding:"80px 20px"}}>
              <div style={{fontSize:36,marginBottom:12}}>🔬</div>
              <div style={{fontSize:16,marginBottom:8,color:"#e0e0e0"}}>Keine Werkstoffe gefunden</div>
              <button onClick={()=>dispatch({type:"reset"})} style={{color:"#f59e0b",background:"none",border:"none",cursor:"pointer",fontSize:13}}>↺ Filter zurücksetzen</button>
            </div>
          :<div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:mob?9:12}}>
              {filtered.map(m=><Card key={m.id} mat={m} onClick={setSel} mob={mob}/>)}
            </div>}
        <div style={{height:24}}/>
      </main>
    </div>

    {mob&&fo&&<div onClick={()=>setFo(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:500,display:"flex",flexDirection:"column",justifyContent:"flex-end",backdropFilter:"blur(3px)"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0e0e0e",borderRadius:"18px 18px 0 0",border:"1px solid #1e1e1e",maxHeight:"88vh",overflowY:"auto",padding:"0 0 8px"}}>
        <div style={{width:36,height:4,background:"#282828",borderRadius:2,margin:"14px auto 0"}}/>
        <FPanel state={state} dispatch={dispatch} count={filtered.length} total={MATS.length} mob={true} onClose={()=>setFo(false)}/>
      </div>
    </div>}

    <Modal mat={sel} onClose={()=>setSel(null)} mob={mob}/>

    <footer style={{background:"#0a0a0a",borderTop:"1px solid #141414",padding:"8px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:10,color:"#c0c0c0"}}>WerkstoffDB · {MATS.length} Werkstoffe · Alle Angaben Richtwerte ohne Gewähr</span>
      {!mob&&<span style={{fontSize:10,color:"#c0c0c0"}}>★ = Bewertung 1–5 · Klick auf Karte → Details</span>}
    </footer>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
