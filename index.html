<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>ISO‑Passungsrechner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial,system-ui,Segoe UI;
  background:#f3f4f6;
  padding:20px;
}
.card{
  max-width:600px;
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  margin:auto;
}
h1{margin-top:0}
input,select{
  width:100%;
  padding:8px;
  margin:6px 0 14px 0;
}
.result{
  background:#f9fafb;
  padding:12px;
  border-radius:10px;
}
.good{color:green}
.bad{color:red}
small{color:#666}
</style>
</head>

<body>

<div class="card">
  <h1>ISO‑Passungsrechner</h1>
  <small>Richtwerte nach ISO 286 – Ausbildungs‑ & Praxisnah</small>

  <label>Nennmaß [mm]</label>
  <input type="number" id="nenn" value="20">

  <label>Bohrung (z. B. H7)</label>
  <select id="bohrung">
    <option value="H7">H7</option>
    <option value="H8">H8</option>
    <option value="H9">H9</option>
  </select>

  <label>Welle (z. B. h6)</label>
  <select id="welle">
    <option value="h6">h6</option>
    <option value="h7">h7</option>
    <option value="f7">f7</option>
    <option value="k6">k6</option>
  </select>

  <button onclick="rechnen()">Berechnen</button>

  <div class="result" id="out"></div>
</div>

<script>
/* ===================================================
   ISO‑TOLERANZEN (vereinfachte Richtwerte)
   Einheit: mm
   =================================================== */

const IT = {
  6: d => 0.010,
  7: d => 0.016,
  8: d => 0.025,
  9: d => 0.040
};

const shaftDeviation = {
  h: d => 0,
  f: d => -0.025,
  k: d => +0.010
};

function rechnen(){
  const d = Number(document.getElementById("nenn").value);
  const bore = document.getElementById("bohrung").value;
  const shaft = document.getElementById("welle").value;

  const boreIT = Number(bore.replace("H",""));
  const shaftIT = Number(shaft.replace(/[a-z]/gi,""));
  const shaftPos = shaft[0];

  const TB = IT[boreIT](d);
  const TS = IT[shaftIT](d);
  const ES = shaftDeviation[shaftPos](d);

  const boreMin = d;
  const boreMax = d + TB;

  const shaftMax = d + ES;
  const shaftMin = shaftMax - TS;

  const minClear = (boreMin - shaftMax).toFixed(3);
  const maxClear = (boreMax - shaftMin).toFixed(3);

  let type = "";
  if(maxClear < 0) type = "<span class='bad'>Presspassung</span>";
  else if(minClear > 0) type = "<span class='good'>Spielpassung</span>";
  else type = "Übergangspassung";

  document.getElementById("out").innerHTML = `
  <h3>Ergebnis</h3>
  <b>Bohrung:</b><br>
  ${boreMin.toFixed(3)} … ${boreMax.toFixed(3)} mm<br><br>

  <b>Welle:</b><br>
  ${shaftMin.toFixed(3)} … ${shaftMax.toFixed(3)} mm<br><br>

  <b>Spiel / Übermaß:</b><br>
  min: ${minClear} mm<br>
  max: ${maxClear} mm<br><br>

  <b>Passungsart:</b> ${type}
  `;
}
</script>

</body>
</html>
