<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>ISO Passungs‑ & Allgemeintoleranzrechner (vollständig)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f3f4f6;padding:20px}
.card{max-width:900px;background:#fff;padding:20px;border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.08);margin:20px auto}
h1,h2{margin-top:0}
input,select,button{width:100%;padding:8px;margin:6px 0 14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.result{background:#f9fafb;padding:12px;border-radius:10px}
.good{color:green}.bad{color:red}
small{color:#666}
</style>
</head>

<body>

<div class="card">
<h1>ISO‑Passungsrechner (ISO 286 – vollständig)</h1>
<small>Normnahe Berechnung aller Bohrungs‑ und Wellenlagen · Richtwerte</small>

<div class="grid">
  <input id="nenn" type="number" placeholder="Nennmaß [mm]" value="20">

  <select id="bohrung">
    <option value="H">Bohrung H</option>
    <option value="G">Bohrung G</option>
    <option value="F">Bohrung F</option>
    <option value="E">Bohrung E</option>
    <option value="JS">Bohrung JS</option>
    <option value="K">Bohrung K</option>
    <option value="M">Bohrung M</option>
    <option value="N">Bohrung N</option>
    <option value="P">Bohrung P</option>
  </select>

  <select id="welle">
    <option value="h">Welle h</option>
    <option value="g">Welle g</option>
    <option value="f">Welle f</option>
    <option value="js">Welle js</option>
    <option value="k">Welle k</option>
    <option value="m">Welle m</option>
    <option value="n">Welle n</option>
    <option value="p">Welle p</option>
  </select>

  <select id="it">
    <option>6</option>
    <option selected>7</option>
    <option>8</option>
    <option>9</option>
    <option>10</option>
    <option>11</option>
    <option>12</option>
  </select>
</div>

<button onclick="calcISO()">Passung berechnen</button>

<div id="out" class="result"></div>
</div>

<!-- ================= ALLGEMEINTOLERANZ ================= -->

<div class="card">
<h2>Allgemeintoleranz (ISO 2768)</h2>

<div class="grid">
  <input type="number" id="g_nenn" placeholder="Nennmaß [mm]">
  <select id="g_klasse">
    <option value="f">fein (f)</option>
    <option value="m" selected>mittel (m)</option>
    <option value="c">grob (c)</option>
    <option value="v">sehr grob (v)</option>
  </select>
</div>

<button onclick="calcISO2768()">Berechnen</button>
<div id="g_out" class="result"></div>
</div>

<script>
/* ================= ISO 286 KERN ================= */

function IT(grade,d){
  return (0.45*Math.cbrt(d)+0.001*d) * Math.pow(10,grade-6) / 1000;
}

function deviation(letter,d,isHole){
  const map={
    A:-11,B:-7,C:-4,D:-2,E:-1,F:-0.5,
    G:-0.2,H:0,JS:0,
    K:+1,M:+3,N:+5,P:+8,
    a:-11,b:-7,c:-4,d:-2,e:-1,f:-0.5,
    g:-0.2,h:0,js:0,
    k:+1,m:+3,n:+5,p:+8
  };
  const m = map[letter];
  return m ? m*Math.cbrt(d)/1000 : 0;
}

function calcISO(){
  const d = Number(nenn.value);
  const it = Number(it.value);
  const bh = bohrung.value;
  const wl = welle.value;

  const T = IT(it,d);
  const ESb = deviation(bh,d,true);
  const ESs = deviation(wl,d,false);

  const boreMin = d + ESb;
  const boreMax = boreMin + T;

  const shaftMax = d + ESs;
  const shaftMin = shaftMax - T;

  const min = (boreMin-shaftMax).toFixed(4);
  const max = (boreMax-shaftMin).toFixed(4);

  let type="Übergangspassung";
  if(max<0) type="<span class='bad'>Übermaßpassung</span>";
  if(min>0) type="<span class='good'>Spielpassung</span>";

  out.innerHTML = `
<b>Bohrung:</b> ${boreMin.toFixed(4)} … ${boreMax.toFixed(4)} mm<br>
<b>Welle:</b> ${shaftMin.toFixed(4)} … ${shaftMax.toFixed(4)} mm<br><br>
<b>Spiel / Übermaß:</b><br>
min: ${min} mm<br>
max: ${max} mm<br><br>
<b>Passungsart:</b> ${type}
`;
}

/* ================= ISO 2768 ================= */

function calcISO2768(){
  const d=Math.abs(Number(g_nenn.value));
  const k=g_klasse.value;
  const t={
    f:[[6,0.05],[30,0.1],[120,0.15],[400,0.2],[1000,0.3],[1e9,0.5]],
    m:[[6,0.1],[30,0.2],[120,0.3],[400,0.5],[1000,0.8],[1e9,1.2]],
    c:[[6,0.2],[30,0.5],[120,0.8],[400,1.2],[1000,2.0],[1e9,3.0]],
    v:[[6,0.5],[30,1.0],[120,1.5],[400,2.5],[1000,4.0],[1e9,6.0]]
  }[k];

  let tol=0;
  for(const [l,v] of t){ if(d<=l){ tol=v; break; } }

  g_out.innerHTML =
    `Nennmaß ${d.toFixed(3)} mm<br>
     Toleranz ±${tol} mm<br><br>
     Maß: <b>${(d-tol).toFixed(3)} … ${(d+tol).toFixed(3)} mm</b>`;
}
</script>

</body>
</html>
