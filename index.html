function useWindowWidth() {
  const [w,setW] = useState(window.innerWidth);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener("resize",h);
    return ()=>window.removeEventListener("resize",h);
  },[]);
  return w;
}

function rangeOverlap(matVal, filterLo, filterHi) {
  const fLo = Math.min(filterLo, filterHi);
  const fHi = Math.max(filterLo, filterHi);
  const mLo = rMin(matVal);
  const mHi = rMax(matVal);
  return mHi >= fLo && mLo <= fHi;
}

function Bar({val, maxVal, color}) {
  const pct = Math.min(100,(rMax(val)/maxVal)*100);
  return (
    <div style={{background:"#1c1c1c",borderRadius:2,height:3,overflow:"hidden",marginTop:3}}>
      <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:2}} />
    </div>
  );
}

function Tag({children, cat}) {
  const c = CAT[cat]||CAT["Stahl"];
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:999,background:c.bg,
    color:c.text,border:`1px solid ${c.border}55`,letterSpacing:"0.05em",fontWeight:700,whiteSpace:"nowrap"}}>
    {children}
  </span>;
}

function NumInput({value, onChange}) {
  return (
    <input type="number" value={value}
      onChange={e=>onChange(e.target.value===""?"":Number(e.target.value))}
      style={{width:"100%",background:"#111",border:"1px solid #2a2a2a",color:"#f0f0f0",
        padding:"6px 8px",borderRadius:5,fontSize:12,fontFamily:"monospace"}} />
  );
}

function RangeFilter({label, unit, lo, hi, onLo, onHi}) {
  return (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{fontSize:10,color:"#d0d0d0",textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</span>

                background:active?(col?.bg||"#1a1a1a"):"transparent",
                border:active?`1px solid ${col?.border||"#f59e0b"}66`:"1px solid #222",
                color:active?(col?.text||"#f59e0b"):"#d0d0d0",transition:"all 0.15s"}}>{c}</button>;
          })}
        </div>
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:14}}>
        <div style={{fontSize:10,color:"#d0d0d0",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Mechanische Eigenschaften</div>
        <RangeFilter label="Zugfestigkeit" unit="MPa" lo={tensile[0]} hi={tensile[1]}
          onLo={v=>dispatch({type:"tensile",v:[v,tensile[1]]})}
          onHi={v=>dispatch({type:"tensile",v:[tensile[0],v]})} />
        <RangeFilter label="Streckgrenze" unit="MPa" lo={yld[0]} hi={yld[1]}
          onLo={v=>dispatch({type:"yld",v:[v,yld[1]]})}
          onHi={v=>dispatch({type:"yld",v:[yld[0],v]})} />
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:14,marginTop:4}}>
        <div style={{fontSize:10,color:"#d0d0d0",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Temperatur</div>
        <RangeFilter label="Temp. max" unit="°C" lo={tmax[0]} hi={tmax[1]}
          onLo={v=>dispatch({type:"tmax",v:[v,tmax[1]]})}
          onHi={v=>dispatch({type:"tmax",v:[tmax[0],v]})} />
        <RangeFilter label="Temp. min" unit="°C" lo={tmin[0]} hi={tmin[1]}
          onLo={v=>dispatch({type:"tmin",v:[v,tmin[1]]})}
          onHi={v=>dispatch({type:"tmin",v:[tmin[0],v]})} />
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:14,marginTop:4}}>
        <div style={{fontSize:10,color:"#d0d0d0",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Physikalisch</div>
        <RangeFilter label="Dichte" unit="kg/dm³" lo={dens[0]} hi={dens[1]}
          onLo={v=>dispatch({type:"dens",v:[v,dens[1]]})}
          onHi={v=>dispatch({type:"dens",v:[dens[0],v]})} />
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:14,marginTop:4}}>
        <div style={{fontSize:10,color:"#d0d0d0",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:7}}>Bestandteil / Element</div>
        <input value={comp} onChange={e=>dispatch({type:"comp",v:e.target.value})}
          placeholder="z. B. Cr, Mo, V, Ni, Co …"
          style={{width:"100%",background:"#111",border:"1px solid #2a2a2a",color:"#f0f0f0",
            padding:"8px 10px",borderRadius:6,fontSize:13,fontFamily:"inherit"}} />
        <div style={{fontSize:10,color:"#b0b0b0",marginTop:5}}>Elementkürzel – nur für Metalle/Stähle</div>
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:14,marginTop:14,textAlign:"center"}}>
        <span style={{fontSize:12,color:"#d0d0d0"}}>
          <span style={{color:"#f59e0b",fontWeight:700,fontSize:15}}>{count}</span> / {total} Werkstoffe
        </span>
      </div>
      {isMobile && <button onClick={()=>dispatch({type:"reset"})}
        style={{marginTop:14,width:"100%",padding:"11px",background:"#111",
          border:"1px solid #252525",color:"#f59e0b",borderRadius:8,cursor:"pointer",
          fontSize:13,fontWeight:600}}>↺ Filter zurücksetzen</button>}
    </div>
  );
}

const INIT = {
  tensile:[0,2200], yld:[0,2200], tmax:[-200,2100], tmin:[-210,400],
  dens:[0.8,22], comp:"", search:"", cat:"Alle"
};
function reducer(s,a) {
  if(a.type==="reset") return {...INIT};
  return {...s,[a.type]:a.v};
}

function App() {
  const width = useWindowWidth();
  const isMobile = width < 768;
  const isTablet = width < 1100;
  const [state, dispatch] = React.useReducer(reducer, INIT);
  const [selected, setSelected] = useState(null);
  const [filterOpen, setFilterOpen] = useState(false);

  const filtered = useMemo(()=>MATS.filter(m=>{
    if(state.cat!=="Alle" && m.cat!==state.cat) return false;
    const q=state.search.toLowerCase();
    if(q && !m.name.toLowerCase().includes(q) && !m.sub.toLowerCase().includes(q)) return false;
    if(!rangeOverlap(m.tensile,state.tensile[0],state.tensile[1])) return false;
    if(!rangeOverlap(m.yield,  state.yld[0],    state.yld[1]))     return false;
    if(!rangeOverlap(m.tmax,   state.tmax[0],   state.tmax[1]))    return false;
    if(!rangeOverlap(m.tmin,   state.tmin[0],   state.tmin[1]))    return false;
    if(!rangeOverlap(m.dens,   state.dens[0],   state.dens[1]))    return false;
    if(state.comp.trim()){
      const el=state.comp.trim().toUpperCase();
      if(!Object.keys(m.comp||{}).map(k=>k.toUpperCase()).includes(el)) return false;
    }
    return true;
  }),[state]);

  const cols = isMobile?1:isTablet?2:3;
  const counts = useMemo(()=>{
    const c={};
    MATS.forEach(m=>{c[m.cat]=(c[m.cat]||0)+1;});
    return c;
  },[]);

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#080808"}}>
      <header style={{background:"#0a0a0a",borderBottom:"1px solid #141414",
        padding:isMobile?"11px 14px":"13px 22px",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        position:"sticky",top:0,zIndex:200,gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:30,height:30,borderRadius:7,flexShrink:0,
            background:"linear-gradient(135deg,#f59e0b,#92400e)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>⚙</div>
          <div>
            <div style={{fontSize:isMobile?14:16,fontWeight:800,letterSpacing:"-0.02em",
              color:"#f0f0f0",lineHeight:1}}>
              WERKSTOFF<span style={{color:"#f59e0b"}}>DB</span>
            </div>
            {!isMobile && <div style={{fontSize:10,color:"#d0d0d0",letterSpacing:"0.1em",textTransform:"uppercase"}}>
              {MATS.length} Werkstoffe · Techn. Datenbank
            </div>}
          </div>
        </div>
        {!isMobile && (
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {["Alle","Stahl","Metall","Kunststoff","3D-Druck"].map(c=>{
              const col=CAT[c]; const active=state.cat===c;
              return <button key={c} onClick={()=>dispatch({type:"cat",v:c})}
                style={{padding:"5px 13px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",
                  background:active?(col?.bg||"#1a1a1a"):"transparent",
                  border:active?`1px solid ${col?.border||"#f59e0b"}66`:"1px solid #1e1e1e",
                  color:active?(col?.text||"#f59e0b"):"#d0d0d0",transition:"all 0.15s"}}>
                {c}{c!=="Alle"&&<span style={{marginLeft:5,opacity:0.7,fontSize:10}}>{counts[c]||0}</span>}
              </button>;
            })}
          </div>
        )}
        {isMobile && (
          <button onClick={()=>setFilterOpen(true)}
            style={{background:"#111",border:"1px solid #252525",color:"#f0f0f0",
              borderRadius:8,padding:"8px 13px",cursor:"pointer",fontSize:13,
              display:"flex",alignItems:"center",gap:6,fontWeight:600}}>
            ⚡ Filter
            {(state.comp||state.search||state.cat!=="Alle")&&
              <span style={{width:7,height:7,borderRadius:"50%",background:"#f59e0b"}}/>}
          </button>
        )}
      </header>

      {isMobile && (
        <div style={{background:"#0a0a0a",borderBottom:"1px solid #141414",
          padding:"9px 14px",display:"flex",gap:6,overflowX:"auto",
          WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
          {["Alle","Stahl","Metall","Kunststoff","3D-Druck"].map(c=>{
            const col=CAT[c]; const active=state.cat===c;
            return <button key={c} onClick={()=>dispatch({type:"cat",v:c})}
              style={{padding:"6px 13px",borderRadius:20,fontSize:12,fontWeight:600,
                cursor:"pointer",flexShrink:0,whiteSpace:"nowrap",
                background:active?(col?.bg||"#1a1a1a"):"#111",
                border:active?`1px solid ${col?.border||"#f59e0b"}66`:"1px solid #1e1e1e",
                color:active?(col?.text||"#f59e0b"):"#d0d0d0"}}>{c}</button>;
          })}
        </div>
      )}

      <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
        {!isMobile && (
          <aside style={{width:248,background:"#0a0a0a",borderRight:"1px solid #141414",
            flexShrink:0,overflowY:"auto",height:"calc(100vh - 57px)",position:"sticky",top:57}}>
            <FilterPanel state={state} dispatch={dispatch} count={filtered.length}
              total={MATS.length} isMobile={false} />
          </aside>
        )}

        <main style={{flex:1,overflowY:"auto",padding:isMobile?"12px":"20px 22px"}}>
          {isMobile && (
            <div style={{marginBottom:12}}>
              <input value={state.search} onChange={e=>dispatch({type:"search",v:e.target.value})}
                placeholder="🔍  Werkstoff suchen…"
                style={{width:"100%",background:"#111",border:"1px solid #252525",color:"#f0f0f0",
                  padding:"10px 14px",borderRadius:8,fontSize:14,fontFamily:"inherit"}} />
            </div>
          )}
          <div style={{marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:"#d0d0d0"}}>
              <span style={{color:"#f59e0b",fontWeight:700}}>{filtered.length}</span> Ergebnisse
              {state.cat!=="Alle"&&<span style={{color:"#b0b0b0"}}> · {state.cat}</span>}
            </span>
            {!isMobile && (
              <div style={{display:"flex",gap:10}}>
                {Object.entries(CAT).map(([cat,col])=>(
                  <div key={cat} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#c0c0c0"}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:col.dot}}/>
                    {cat} ({counts[cat]||0})
                  </div>
                ))}
              </div>
            )}
          </div>
          {filtered.length===0
            ? <div style={{textAlign:"center",padding:"80px 20px"}}>
                <div style={{fontSize:36,marginBottom:12}}>🔬</div>
                <div style={{fontSize:16,marginBottom:8,color:"#e0e0e0"}}>Keine Werkstoffe gefunden</div>
                <button onClick={()=>dispatch({type:"reset"})}
                  style={{color:"#f59e0b",background:"none",border:"none",cursor:"pointer",fontSize:13}}>
                  ↺ Filter zurücksetzen
                </button>
              </div>
            : <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:isMobile?9:12}}>
                {filtered.map(m=>(
                  <MaterialCard key={m.id} mat={m} onClick={setSelected} isMobile={isMobile}/>
                ))}
              </div>
          }
          <div style={{height:24}}/>
        </main>
      </div>

      {isMobile && filterOpen && (
        <div onClick={()=>setFilterOpen(false)}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:500,
            display:"flex",flexDirection:"column",justifyContent:"flex-end",backdropFilter:"blur(3px)"}}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"#0e0e0e",borderRadius:"18px 18px 0 0",
              border:"1px solid #1e1e1e",maxHeight:"88vh",overflowY:"auto",padding:"0 0 8px"}}>
            <div style={{width:36,height:4,background:"#282828",borderRadius:2,margin:"14px auto 0"}}/>
            <FilterPanel state={state} dispatch={dispatch} count={filtered.length}
              total={MATS.length} isMobile={true} onClose={()=>setFilterOpen(false)} />
          </div>
        </div>
      )}

      <DetailModal mat={selected} onClose={()=>setSelected(null)} isMobile={isMobile}/>

      <footer style={{background:"#0a0a0a",borderTop:"1px solid #141414",
        padding:"8px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:10,color:"#c0c0c0"}}>WerkstoffDB · {MATS.length} Werkstoffe · Alle Angaben Richtwerte ohne Gewähr</span>
        {!isMobile && <span style={{fontSize:10,color:"#c0c0c0"}}>Klick auf Karte → Details</span>}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
