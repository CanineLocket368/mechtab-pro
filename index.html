function useWindowWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return w;
}

function Bar({ value, max, color }) {
  return (
    <div style={{background:"#1c1c1c",borderRadius:2,height:3,overflow:"hidden",marginTop:3}}>
      <div style={{width:`${Math.min(100,(value/max)*100)}%`,height:"100%",background:color,borderRadius:2}} />
    </div>
  );
}
function Tag({ children, cat }) {
  const c = CAT[cat]||CAT["Stahl"];
  return <span style={{fontSize:10,padding:"2px 8px",borderRadius:999,background:c.bg,
    color:c.text,border:`1px solid ${c.border}55`,letterSpacing:"0.05em",fontWeight:700,whiteSpace:"nowrap"}}>{children}</span>;
}
function NumInput({ value, onChange }) {
  return (
    <input type="number" value={value} onChange={e=>onChange(Number(e.target.value))}
      style={{width:"100%",background:"#111",border:"1px solid #252525",color:"#ddd",
        padding:"6px 8px",borderRadius:5,fontSize:12,fontFamily:"monospace"}} />
  );
}
function RangeRow({ label, unit, lo, hi, onLo, onHi }) {
  return (
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:10,color:"#666",textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</span>
        <span style={{fontSize:10,color:"#f59e0b",fontFamily:"monospace"}}>{lo} – {hi} {unit}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
        <NumInput value={lo} onChange={v=>onLo(Math.min(v,hi))} />
        <NumInput value={hi} onChange={v=>onHi(Math.max(v,lo))} />
      </div>
    </div>
  );
}

function MaterialCard({ mat, onClick, isMobile }) {
  const c = CAT[mat.category]||CAT["Stahl"];
  const [hov, setHov] = useState(false);
  return (
    <div onClick={()=>onClick(mat)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:hov?c.bg:"#0d0d0d",border:`1px solid ${hov?c.border+"aa":c.border+"2a"}`,
        borderRadius:10,padding:isMobile?"13px":"15px 17px",cursor:"pointer",transition:"all 0.18s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:8}}>
        <div style={{minWidth:0}}>
          <div style={{fontSize:isMobile?13:14,fontWeight:700,color:"#f0f0f0",
            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mat.name}</div>
          <div style={{fontSize:10,color:"#555",marginTop:1}}>{mat.sub}</div>
        </div>
        <Tag cat={mat.category}>{mat.category}</Tag>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 12px"}}>
        {[["tensile",2100],["yield",2100],["tempMax",1100],["density",20]].map(([k,mx])=>(
          <div key={k}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:10,color:"#555"}}>{PROP_LABELS[k]}</span>
              <span style={{fontSize:10,color:"#bbb",fontFamily:"monospace"}}>{mat[k]} {PROP_UNITS[k]}</span>
            </div>
            <Bar value={mat[k]} max={mx} color={c.text} />
          </div>
        ))}
      </div>
      {mat.printTemp && (
        <div style={{marginTop:9,display:"flex",flexWrap:"wrap",gap:5}}>
          <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"rgba(124,58,237,0.1)",
            color:"#a78bfa",border:"1px solid #7c3aed33"}}>?? {mat.printTemp} °C Düse</span>
          {mat.bedTemp>0 && <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,
            background:"rgba(124,58,237,0.1)",color:"#a78bfa",border:"1px solid #7c3aed33"}}>
            ?? {mat.bedTemp} °C Bett</span>}
        </div>
      )}
      {mat.category==="3D-Druck" && mat.printTemp===null && (
        <div style={{marginTop:9}}>
          <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"rgba(124,58,237,0.1)",
            color:"#8b6fb5",border:"1px solid #7c3aed22"}}>Pulver / Harz-Verfahren</span>
        </div>
      )}
    </div>
  );
}

function DetailModal({ mat, onClose, isMobile }) {
  useEffect(()=>{
    if(!mat) return;
    document.body.style.overflow="hidden";
    return ()=>{ document.body.style.overflow=""; };
  },[mat]);
  if(!mat) return null;
  const c = CAT[mat.category]||CAT["Stahl"];
  const comp = Object.entries(mat.composition||{});
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,
      display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center",
      padding:isMobile?0:20,backdropFilter:"blur(4px)"}}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:"#0d0d0d",border:`1px solid ${c.border}55`,
          borderRadius:isMobile?"16px 16px 0 0":12,width:"100%",maxWidth:isMobile?"100%":660,
          maxHeight:isMobile?"90vh":"87vh",overflowY:"auto",
          padding:isMobile?"24px 18px 36px":"28px"}}>
        {isMobile && <div style={{width:36,height:4,background:"#2a2a2a",borderRadius:2,margin:"0 auto 20px"}} />}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,gap:12}}>
          <div style={{minWidth:0}}>
            <div style={{fontSize:isMobile?20:22,fontWeight:800,color:"#f0f0f0",letterSpacing:"-0.02em"}}>{mat.name}</div>
            <div style={{fontSize:12,color:c.text,marginTop:3}}>{mat.category} · {mat.sub}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"1px solid #2a2a2a",color:"#666",
            borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12,flexShrink:0}}>?</button>
        </div>
        <p style={{fontSize:13,color:"#777",lineHeight:1.65,marginBottom:20}}>{mat.desc}</p>
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"1fr 1fr 1fr",gap:8,marginBottom:18}}>
          {[...PROP_KEYS,"hardness"].map(k=>{
            const isHard = k==="hardness";
            return (
              <div key={k} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:7,padding:"10px 12px"}}>
                <div style={{fontSize:9,color:"#3a3a3a",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.08em"}}>
                  {isHard?"Härte":PROP_LABELS[k]}</div>
                <div style={{fontSize:16,fontWeight:700,color:c.text,fontFamily:"monospace"}}>
                  {isHard?mat.hardness:mat[k]}</div>
                <div style={{fontSize:9,color:"#2e2e2e"}}>{isHard?mat.hardnessUnit:PROP_UNITS[k]}</div>
              </div>
            );
          })}
        </div>
        {comp.length>0 && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:"#3a3a3a",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.08em"}}>Zusammensetzung</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {comp.map(([el,pct])=>(
                <div key={el} style={{background:c.bg,border:`1px solid ${c.border}44`,borderRadius:7,
                  padding:"7px 12px",display:"flex",flexDirection:"column",alignItems:"center",minWidth:52}}>
                  <span style={{fontSize:14,fontWeight:800,color:c.text}}>{el}</span>
                  <span style={{fontSize:11,color:"#555",fontFamily:"monospace"}}>{pct}%</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {mat.category==="3D-Druck" && (
          <div style={{background:"rgba(124,58,237,0.07)",border:"1px solid #7c3aed33",borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:10,color:"#7c3aed",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.08em"}}>3D-Druck Parameter</div>
            {mat.printTemp ? (
              <div style={{display:"flex",gap:24}}>
                <div>
                  <div style={{fontSize:10,color:"#555"}}>Düsentemperatur</div>
                  <div style={{fontSize:20,fontWeight:700,color:"#a78bfa",fontFamily:"monospace"}}>{mat.printTemp} °C</div>
                </div>
                {mat.bedTemp>0 && <div>
                  <div style={{fontSize:10,color:"#555"}}>Betttemperatur</div>
                  <div style={{fontSize:20,fontWeight:700,color:"#a78bfa",fontFamily:"monospace"}}>{mat.bedTemp} °C</div>
                </div>}
              </div>
            ) : (
              <div style={{fontSize:13,color:"#666"}}>Pulver- oder Harzbasiertes Verfahren (SLS / SLA / MSLA / LPBF).</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function FilterPanel({ state, dispatch, count, total, isMobile, onClose }) {
  const { tensile, yield:yld, tempMax, tempMin, density, comp, search, cat } = state;
  const cats = ["Alle","Stahl","Metall","Kunststoff","3D-Druck"];
  return (
    <div style={{padding:isMobile?"0 16px 24px":"18px 16px",overflowY:"auto",height:isMobile?"auto":"100%"}}>
      {isMobile
        ? <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <span style={{fontSize:14,fontWeight:700,color:"#e0e0e0"}}>Filter</span>
            <button onClick={onClose} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#888",
              borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12}}>Fertig</button>
          </div>
        : <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <span style={{fontSize:11,letterSpacing:"0.12em",color:"#444",textTransform:"uppercase",fontWeight:700}}>Filter</span>
            <button onClick={()=>dispatch({type:"reset"})} style={{fontSize:10,color:"#f59e0b",background:"none",border:"none",cursor:"pointer"}}>? Reset</button>
          </div>
      }
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>Suche</div>
        <input value={search} onChange={e=>dispatch({type:"search",v:e.target.value})}
          placeholder="Werkstoff suchen…"
          style={{width:"100%",background:"#111",border:"1px solid #252525",color:"#ddd",
            padding:"8px 10px",borderRadius:6,fontSize:13,fontFamily:"inherit"}} />
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:7}}>Kategorie</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {cats.map(c=>{
            const col=CAT[c]; const active=cat===c;
            return <button key={c} onClick={()=>dispatch({type:"cat",v:c})}
              style={{padding:"5px 11px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",
                background:active?(col?.bg||"#1a1a1a"):"transparent",
                border:active?`1px solid ${col?.border||"#f59e0b"}66`:"1px solid #1e1e1e",
                color:active?(col?.text||"#f59e0b"):"#555"}}>{c}</button>;
          })}
        </div>
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:13}}>
        <div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:11}}>Mechanik</div>
        <RangeRow label="Zugfestigkeit" unit="MPa" lo={tensile[0]} hi={tensile[1]}
          onLo={v=>dispatch({type:"tensile",v:[v,tensile[1]]})} onHi={v=>dispatch({type:"tensile",v:[tensile[0],v]})} />
        <RangeRow label="Streckgrenze" unit="MPa" lo={yld[0]} hi={yld[1]}
          onLo={v=>dispatch({type:"yield",v:[v,yld[1]]})} onHi={v=>dispatch({type:"yield",v:[yld[0],v]})} />
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:13,marginTop:4}}>
        <div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:11}}>Temperatur</div>
        <RangeRow label="Temp. max" unit="°C" lo={tempMax[0]} hi={tempMax[1]}
          onLo={v=>dispatch({type:"tempMax",v:[v,tempMax[1]]})} onHi={v=>dispatch({type:"tempMax",v:[tempMax[0],v]})} />
        <RangeRow label="Temp. min" unit="°C" lo={tempMin[0]} hi={tempMin[1]}
          onLo={v=>dispatch({type:"tempMin",v:[v,tempMin[1]]})} onHi={v=>dispatch({type:"tempMin",v:[tempMin[0],v]})} />
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:13,marginTop:4}}>
        <div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:11}}>Physikalisch</div>
        <RangeRow label="Dichte" unit="kg/dm³" lo={density[0]} hi={density[1]}
          onLo={v=>dispatch({type:"density",v:[v,density[1]]})} onHi={v=>dispatch({type:"density",v:[density[0],v]})} />
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:13,marginTop:4}}>
        <div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:7}}>Bestandteil (Element)</div>
        <input value={comp} onChange={e=>dispatch({type:"comp",v:e.target.value})}
          placeholder="z. B. Cr, Mo, V, Ni …"
          style={{width:"100%",background:"#111",border:"1px solid #252525",color:"#ddd",
            padding:"8px 10px",borderRadius:6,fontSize:13,fontFamily:"inherit"}} />
      </div>
      <div style={{borderTop:"1px solid #181818",paddingTop:13,marginTop:14,textAlign:"center"}}>
        <span style={{fontSize:12,color:"#333"}}><span style={{color:"#f59e0b",fontWeight:700}}>{count}</span> / {total} Werkstoffe</span>
      </div>
      {isMobile && <button onClick={()=>dispatch({type:"reset"})}
        style={{marginTop:12,width:"100%",padding:"11px",background:"#111",
          border:"1px solid #252525",color:"#f59e0b",borderRadius:8,cursor:"pointer",
          fontSize:13,fontWeight:600}}>? Filter zurücksetzen</button>}
    </div>
  );
}

const INIT = {
  tensile:[0,2100], yield:[0,2100], tempMax:[-200,1100], tempMin:[-210,300],
  density:[0.8,20], comp:"", search:"", cat:"Alle"
};
function reducer(s, a) {
  if(a.type==="reset") return {...INIT};
  return {...s, [a.type]:a.v};
}

function App() {
  const width = useWindowWidth();
  const isMobile = width < 768;
  const isTablet = width < 1100;
  const [state, dispatch] = React.useReducer(reducer, INIT);
  const [selected, setSelected] = useState(null);
  const [filterOpen, setFilterOpen] = useState(false);

  const filtered = useMemo(()=>MATERIALS.filter(m=>{
    if(state.cat!=="Alle" && m.category!==state.cat) return false;
    const q=state.search.toLowerCase();
    if(q && !m.name.toLowerCase().includes(q) && !m.sub.toLowerCase().includes(q)) return false;
    if(m.tensile<state.tensile[0]||m.tensile>state.tensile[1]) return false;
    if(m.yield<state.yield[0]||m.yield>state.yield[1]) return false;
    if(m.tempMax<state.tempMax[0]||m.tempMax>state.tempMax[1]) return false;
    if(m.tempMin<state.tempMin[0]||m.tempMin>state.tempMin[1]) return false;
    if(m.density<state.density[0]||m.density>state.density[1]) return false;
    if(state.comp.trim()){
      const el=state.comp.trim().toUpperCase();
      if(!Object.keys(m.composition||{}).map(k=>k.toUpperCase()).includes(el)) return false;
    }
    return true;
  }),[state]);

  const cols = isMobile ? 1 : isTablet ? 2 : 3;

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#080808"}}>
      <header style={{background:"#0a0a0a",borderBottom:"1px solid #141414",
        padding:isMobile?"11px 14px":"13px 22px",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        position:"sticky",top:0,zIndex:200,gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:30,height:30,borderRadius:7,flexShrink:0,
            background:"linear-gradient(135deg,#f59e0b,#92400e)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>?</div>
          <div>
            <div style={{fontSize:isMobile?14:16,fontWeight:800,letterSpacing:"-0.02em",color:"#f0f0f0",lineHeight:1}}>
              WERKSTOFF<span style={{color:"#f59e0b"}}>DB</span></div>
            {!isMobile && <div style={{fontSize:10,color:"#333",letterSpacing:"0.1em",textTransform:"uppercase"}}>
              {MATERIALS.length} Werkstoffe · Techn. Datenbank</div>}
          </div>
        </div>
        {!isMobile && (
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {["Alle","Stahl","Metall","Kunststoff","3D-Druck"].map(c=>{
              const col=CAT[c]; const active=state.cat===c;
              return <button key={c} onClick={()=>dispatch({type:"cat",v:c})}
                style={{padding:"5px 13px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",
                  background:active?(col?.bg||"#1a1a1a"):"transparent",
                  border:active?`1px solid ${col?.border||"#f59e0b"}66`:"1px solid #1e1e1e",
                  color:active?(col?.text||"#f59e0b"):"#555",transition:"all 0.15s"}}>{c}</button>;
            })}
          </div>
        )}
        {isMobile && (
          <button onClick={()=>setFilterOpen(true)}
            style={{background:"#111",border:"1px solid #252525",color:"#ccc",
              borderRadius:8,padding:"8px 13px",cursor:"pointer",fontSize:13,
              display:"flex",alignItems:"center",gap:6,fontWeight:600}}>
            ? Filter
            {(state.comp||state.search||state.cat!=="Alle")&&
              <span style={{width:7,height:7,borderRadius:"50%",background:"#f59e0b"}} />}
          </button>
        )}
      </header>

      {isMobile && (
        <div style={{background:"#0a0a0a",borderBottom:"1px solid #141414",
          padding:"9px 14px",display:"flex",gap:6,overflowX:"auto",
          WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
          {["Alle","Stahl","Metall","Kunststoff","3D-Druck"].map(c=>{
            const col=CAT[c]; const active=state.cat===c;
            return <button key={c} onClick={()=>dispatch({type:"cat",v:c})}
              style={{padding:"6px 13px",borderRadius:20,fontSize:12,fontWeight:600,
                cursor:"pointer",flexShrink:0,whiteSpace:"nowrap",
                background:active?(col?.bg||"#1a1a1a"):"#111",
                border:active?`1px solid ${col?.border||"#f59e0b"}66`:"1px solid #1e1e1e",
                color:active?(col?.text||"#f59e0b"):"#555"}}>{c}</button>;
          })}
        </div>
      )}

      <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
        {!isMobile && (
          <aside style={{width:242,background:"#0a0a0a",borderRight:"1px solid #141414",
            flexShrink:0,overflowY:"auto",height:"calc(100vh - 57px)",position:"sticky",top:57}}>
            <FilterPanel state={state} dispatch={dispatch} count={filtered.length}
              total={MATERIALS.length} isMobile={false} />
          </aside>
        )}
        <main style={{flex:1,overflowY:"auto",padding:isMobile?"12px":"20px 22px"}}>
          {isMobile && (
            <div style={{marginBottom:12}}>
              <input value={state.search} onChange={e=>dispatch({type:"search",v:e.target.value})}
                placeholder="??  Werkstoff suchen…"
                style={{width:"100%",background:"#111",border:"1px solid #252525",color:"#ddd",
                  padding:"10px 14px",borderRadius:8,fontSize:14,fontFamily:"inherit"}} />
            </div>
          )}
          <div style={{marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:"#3a3a3a"}}>
              <span style={{color:"#f59e0b",fontWeight:700}}>{filtered.length}</span> Ergebnisse
            </span>
          </div>
          {filtered.length===0
            ? <div style={{textAlign:"center",padding:"80px 20px",color:"#2a2a2a"}}>
                <div style={{fontSize:36,marginBottom:12}}>??</div>
                <div style={{fontSize:16,marginBottom:8,color:"#444"}}>Keine Werkstoffe gefunden</div>
                <button onClick={()=>dispatch({type:"reset"})}
                  style={{color:"#f59e0b",background:"none",border:"none",cursor:"pointer",fontSize:13}}>
                  ? Filter zurücksetzen</button>
              </div>
            : <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:isMobile?9:12}}>
                {filtered.map(m=><MaterialCard key={m.id} mat={m} onClick={setSelected} isMobile={isMobile} />)}
              </div>
          }
          <div style={{height:20}} />
        </main>
      </div>

      {isMobile && filterOpen && (
        <div onClick={()=>setFilterOpen(false)} style={{position:"fixed",inset:0,
          background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",flexDirection:"column",
          justifyContent:"flex-end",backdropFilter:"blur(3px)"}}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:"#0e0e0e",borderRadius:"18px 18px 0 0",border:"1px solid #1e1e1e",
              maxHeight:"88vh",overflowY:"auto",padding:"0 0 8px"}}>
            <div style={{width:36,height:4,background:"#282828",borderRadius:2,margin:"14px auto 0"}} />
            <FilterPanel state={state} dispatch={dispatch} count={filtered.length}
              total={MATERIALS.length} isMobile={true} onClose={()=>setFilterOpen(false)} />
          </div>
        </div>
      )}

      <DetailModal mat={selected} onClose={()=>setSelected(null)} isMobile={isMobile} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
