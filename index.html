<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>ISO‑286 / ISO‑2768 Passungsrechner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f3f4f6;padding:20px}
.card{max-width:1200px;margin:20px auto;background:#fff;padding:20px;
border-radius:16px;box-shadow:0 10px 26px rgba(0,0,0,.08)}
h1,h2{margin-top:0}
small{color:#666}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px
}

input,select,button{width:100%;padding:8px;margin:6px 0 12px}
button{background:#2563eb;color:#fff;border:none;border-radius:8px}

.result{background:#f8fafc;padding:16px;border-radius:10px;margin-top:12px}

.good{color:green}
.mid{color:#b45309}
.bad{color:red}

/* Grafik */
.graph{
  position:relative;
  height:70px;
  background:#e5e7eb;
  border-radius:35px;
  padding:0 140px;
  margin-top:20px
}
.zero-line{
  position:absolute;left:50%;top:-12px;bottom:-12px;
  width:2px;background:black
}
.bar{
  position:absolute;height:26px;top:50%;
  transform:translateY(-50%);
  border-radius:13px;
  transition:left .35s ease,width .35s ease
}
.bore{background:#2563eb}
.shaft{background:#dc2626;top:calc(50% + 18px)}
.bar span{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:600
}
</style>
</head>

<body>

<!-- ================= ISO‑286 ================= -->
<div class="card">
<h1>ISO‑286 Passungsrechner</h1>
<small>Bohrung und Welle mit separaten IT‑Graden</small>

<div class="grid">
  <input id="nenn" type="number" value="20" placeholder="Nennmaß [mm]">

  <select id="holeLetter">
    <option>A</option><option>B</option><option>C</option><option>D</option>
    <option>E</option><option>F</option><option>G</option>
    <option selected>H</option><option>JS</option>
    <option>K</option><option>M</option><option>N</option><option>P</option>
  </select>

  <select id="holeIT">
    <option>5</option><option>6</option><option selected>7</option>
    <option>8</option><option>9</option><option>10</option>
  </select>

  <select id="shaftLetter">
    <option>a</option><option>b</option><option>c</option><option>d</option>
    <option>e</option><option>f</option><option>g</option>
    <option selected>h</option><option>js</option>
    <option>k</option><option>m</option><option>n</option><option>p</option>
  </select>

  <select id="shaftIT">
    <option>5</option><option selected>6</option>
    <option>7</option><option>8</option><option>9</option>
  </select>
</div>

<button onclick="calcISO()">Berechnen</button>

<div id="out" class="result"></div>

<div class="graph" id="graph">
  <div class="zero-line"></div>

  <div id="boreBar" class="bar bore">
    <span id="boreTxt"></span>
  </div>

  <div id="shaftBar" class="bar shaft">
    <span id="shaftTxt"></span>
  </div>
</div>
</div>

<!-- ================= ISO‑2768 ================= -->
<div class="card">
<h2>Allgemeintoleranz ISO 2768</h2>

<div class="grid">
  <input id="gN" type="number" placeholder="Nennmaß [mm]">
  <select id="gK">
    <option value="f">fein</option>
    <option value="m" selected>mittel</option>
    <option value="c">grob</option>
    <option value="v">sehr grob</option>
  </select>
</div>

<button onclick="calcISO2768()">Berechnen</button>
<div id="out2768" class="result"></div>
</div>

<script>
/* ===== IT‑Grundtoleranzen (µm, Auszug) ===== */
const IT_TABLE={
  5:16, 6:22, 7:35, 8:54, 9:87, 10:140
};

/* ===== Grundabmaße (vereinfachte Normlogik) ===== */
const HOLE_BASE={A:60,B:40,C:25,D:16,E:10,F:6,G:2,H:0,JS:-5,K:-2,M:-6,N:-10,P:-16};
const SHAFT_BASE={a:-60,b:-40,c:-25,d:-16,e:-10,f:-6,g:-2,h:0,js:-5,k:2,m:6,n:10,p:16};

function calcISO(){
  const d=+nenn.value;

  const T_hole = IT_TABLE[holeIT.value] / 1000;
  const T_shaft = IT_TABLE[shaftIT.value] / 1000;

  const EB = (HOLE_BASE[holeLetter.value]||0)/1000;
  const ES = (SHAFT_BASE[shaftLetter.value]||0)/1000;

  const boreMin = d + EB;
  const boreMax = boreMin + T_hole;

  const shaftMax = d + ES;
  const shaftMin = shaftMax - T_shaft;

  const minSpiel = boreMin - shaftMax;
  const maxSpiel = boreMax - shaftMin;

  let type="<span class='mid'>Übergangspassung</span>";
  if(minSpiel>0) type="<span class='good'>Spielpassung</span>";
  if(maxSpiel<0) type="<span class='bad'>Übermaßpassung</span>";

  out.innerHTML=`
<b>Bohrung:</b> ${boreMin.toFixed(3)} … ${boreMax.toFixed(3)} mm<br>
<b>Welle:</b> ${shaftMin.toFixed(3)} … ${shaftMax.toFixed(3)} mm<br><br>
<b>Passung:</b> ${type}
`;

  const refMin=Math.min(boreMin,shaftMin);
  const refMax=Math.max(boreMax,shaftMax);
  const span=refMax-refMin;
  const usable=graph.clientWidth-280;
  const scale=usable/span;

  const boreLeft=(boreMin-refMin)*scale+140;
  const shaftLeft=(shaftMin-refMin)*scale+140;

  boreBar.style.left=boreLeft+"px";
  boreBar.style.width=T_hole*scale+"px";
  shaftBar.style.left=shaftLeft+"px";
  shaftBar.style.width=T_shaft*scale+"px";

  boreTxt.textContent=`${holeLetter.value}${holeIT.value}`;
  shaftTxt.textContent=`${shaftLetter.value}${shaftIT.value}`;
}

/* ===== ISO‑2768 ===== */
function calcISO2768(){
  const d0=+gN.value;
  const tbl={
    f:[[6,0.05],[30,0.1],[120,0.15],[1e9,0.3]],
    m:[[6,0.1],[30,0.2],[120,0.3],[1e9,0.8]],
    c:[[6,0.2],[30,0.5],[120,0.8],[1e9,2]],
    v:[[6,0.5],[30,1],[120,1.5],[1e9,4]]
  }[gK.value];

  let t=0;
  for(const [l,v] of tbl){ if(d0<=l){t=v;break;} }
  out2768.innerHTML=`<b>${(d0-t).toFixed(2)} … ${(d0+t).toFixed(2)} mm</b>`;
}
</script>

</body>
</html>
